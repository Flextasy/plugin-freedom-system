# v3 UI Design Specification
# Generated: 2026-02-14
# Plugin: Degrain — Granular Delay
# Style: Clean Futurism (Baby Audio / Excite Audio Lifeline reference)

window:
  width: 900
  height: 480
  resizable: false
  title: "Degrain"

colors:
  background: "#0d0d12"
  backgroundGradientEnd: "#15151e"
  panel: "#1a1a26"
  panelBorder: "rgba(255,255,255,0.06)"
  panelBorderRadius: 12

  # Section accent colors
  delayAccent: "#e85d3a"       # Warm red-orange
  grainAccent: "#3aaa5c"       # Natural green
  characterAccent: "#3a8ed6"   # Friendly blue
  degrainAccent: "#e8a832"    # Golden yellow
  mixAccent: "#b55dba"         # Playful purple

  primary: "#e85d3a"
  text: "#d0d0d8"
  textDim: "#6a6a78"
  textBright: "#ffffff"
  danger: "#e83030"
  freezeActive: "#3aaa5c"
  freezeGlow: "rgba(58, 170, 92, 0.4)"
  knobBase: "#2a2a38"
  knobBaseBorder: "rgba(255,255,255,0.08)"
  sliderTrack: "#1e1e2a"
  sliderTrackBorder: "rgba(255,255,255,0.05)"

typography:
  family: "Inter, -apple-system, system-ui, sans-serif"
  sectionHeader:
    size: 10
    weight: 600
    letterSpacing: 2.5
    transform: uppercase
    color: "per-section accent"
  paramLabel:
    size: 8
    weight: 500
    letterSpacing: 1
    transform: uppercase
    color: "#6a6a78"
  paramValue:
    size: 9
    weight: 600
    color: "#d0d0d8"
  pluginTitle:
    size: 18
    weight: 700
    letterSpacing: 5
    transform: uppercase
    color: "#ffffff"

layout:
  type: vertical-split
  headerHeight: 44
  bodyHeight: 436
  padding: 8

  header:
    type: horizontal-bar
    background: "linear-gradient(180deg, #16161f, #12121a)"
    borderBottom: "1px solid rgba(255,255,255,0.06)"
    borderRadius: "10px 10px 0 0"
    content:
      - type: title
        text: "DEGRAIN"
        position: left
        style: pluginTitle
      - type: subtitle
        text: "GRANULAR DELAY"
        position: left
        offsetLeft: 14
        style:
          size: 8
          weight: 500
          letterSpacing: 2.5
          color: "#5a5a68"
      - type: button
        id: freeze
        text: "FREEZE"
        position: right
        marginRight: 14
      - type: rotary-knob
        id: dry_wet
        label: "DRY/WET"
        position: right
        alwaysShowValue: true

  body:
    type: horizontal-sections
    gap: 6
    sections:
      - id: delay
        label: "DELAY"
        accentColor: "#e85d3a"
        flex: 1.0
      - id: grain
        label: "GRAIN"
        accentColor: "#3aaa5c"
        flex: 1.5
      - id: character
        label: "CHARACTER"
        accentColor: "#3a8ed6"
        flex: 2.0
      - id: degrain
        label: "DEGRAIN"
        accentColor: "#e8a832"
        flex: 1.6
        special: true
      - id: mix
        label: "MIX"
        accentColor: "#b55dba"
        flex: 0.6

sections:
  delay:
    background: "#1a1a26"
    borderRadius: 12
    border: "1px solid rgba(255,255,255,0.06)"
    padding: 10
    accentColor: "#e85d3a"
    controls:
      - id: delay_time
        type: rotary-knob
        label: "TIME"
        min: 1
        max: 2000
        default: 250
        unit: "ms"
        curve: logarithmic
        knobColor: "#e85d3a"
        syncable: true
      - id: delay_sync_toggle
        type: toggle-button
        label: "SYNC"
        default: false
        accentColor: "#e85d3a"
      - id: delay_sync_division
        type: combo-box
        label: "DIV"
        visibleWhen:
          parameter: delay_sync_toggle
          value: true
        options:
          - { label: "1/1", value: "1/1" }
          - { label: "1/1D", value: "1/1D" }
          - { label: "1/1T", value: "1/1T" }
          - { label: "1/2", value: "1/2" }
          - { label: "1/2D", value: "1/2D" }
          - { label: "1/2T", value: "1/2T" }
          - { label: "1/4", value: "1/4" }
          - { label: "1/4D", value: "1/4D" }
          - { label: "1/4T", value: "1/4T" }
          - { label: "1/8", value: "1/8" }
          - { label: "1/8D", value: "1/8D" }
          - { label: "1/8T", value: "1/8T" }
          - { label: "1/16", value: "1/16" }
          - { label: "1/16D", value: "1/16D" }
          - { label: "1/16T", value: "1/16T" }
          - { label: "1/32", value: "1/32" }
          - { label: "1/32D", value: "1/32D" }
          - { label: "1/32T", value: "1/32T" }
        default: "1/4"

  grain:
    background: "#1a1a26"
    borderRadius: 12
    border: "1px solid rgba(255,255,255,0.06)"
    padding: 10
    accentColor: "#3aaa5c"
    controls:
      - id: grain_size
        type: rotary-knob
        label: "SIZE"
        min: 5
        max: 500
        default: 80
        unit: "ms"
        curve: logarithmic
        knobColor: "#3aaa5c"
      - id: grain_rate
        type: rotary-knob
        label: "RATE"
        min: 0.1
        max: 100
        default: 10
        unit: "Hz"
        curve: logarithmic
        knobColor: "#3aaa5c"
        syncable: true
      - id: grain_rate_sync_toggle
        type: toggle-button
        label: "SYNC"
        default: false
        accentColor: "#3aaa5c"
      - id: grain_rate_sync_division
        type: combo-box
        label: "DIV"
        visibleWhen:
          parameter: grain_rate_sync_toggle
          value: true
        options:
          - { label: "1/1", value: "1/1" }
          - { label: "1/1D", value: "1/1D" }
          - { label: "1/1T", value: "1/1T" }
          - { label: "1/2", value: "1/2" }
          - { label: "1/2D", value: "1/2D" }
          - { label: "1/2T", value: "1/2T" }
          - { label: "1/4", value: "1/4" }
          - { label: "1/4D", value: "1/4D" }
          - { label: "1/4T", value: "1/4T" }
          - { label: "1/8", value: "1/8" }
          - { label: "1/8D", value: "1/8D" }
          - { label: "1/8T", value: "1/8T" }
          - { label: "1/16", value: "1/16" }
          - { label: "1/16D", value: "1/16D" }
          - { label: "1/16T", value: "1/16T" }
          - { label: "1/32", value: "1/32" }
          - { label: "1/32D", value: "1/32D" }
          - { label: "1/32T", value: "1/32T" }
        default: "1/8"
      - id: grain_shape
        type: segmented-selector
        label: "SHAPE"
        options:
          - { label: "SIN", value: "sine" }
          - { label: "TRI", value: "triangle" }
          - { label: "SQR", value: "square" }
          - { label: "RMP", value: "ramp" }
        default: "sine"
        accentColor: "#3aaa5c"

  character:
    background: "#1a1a26"
    borderRadius: 12
    border: "1px solid rgba(255,255,255,0.06)"
    padding: 10
    accentColor: "#3a8ed6"
    controls:
      - id: feedback
        type: rotary-knob
        label: "FEEDBACK"
        row: 1
        column: 1
        min: 0
        max: 120
        default: 40
        unit: "%"
        warningAbove: 100
        warningColor: "#e83030"
        knobColor: "#3a8ed6"
      - id: diffusion
        type: rotary-knob
        label: "DIFFUSION"
        row: 1
        column: 2
        min: 0
        max: 100
        default: 30
        unit: "%"
        knobColor: "#3a8ed6"
      - id: stereo_spread
        type: rotary-knob
        label: "SPREAD"
        row: 2
        column: 1
        min: 0
        max: 100
        default: 50
        unit: "%"
        knobColor: "#3a8ed6"
      - id: detune
        type: rotary-knob
        label: "DETUNE"
        row: 2
        column: 2
        min: -50
        max: 50
        default: 0
        unit: "ct"
        bipolar: true
        centerNotch: true
        knobColor: "#3a8ed6"
      - id: low_cut
        type: horizontal-slider
        label: "LO CUT"
        row: 3
        column: 1
        min: 20
        max: 5000
        default: 20
        unit: "Hz"
        curve: logarithmic
        fillDirection: "left-to-right"
        accentColor: "#3a8ed6"
      - id: high_cut
        type: horizontal-slider
        label: "HI CUT"
        row: 3
        column: 2
        min: 200
        max: 20000
        default: 20000
        unit: "Hz"
        curve: logarithmic
        fillDirection: "right-to-left"
        accentColor: "#3a8ed6"

  degrain:
    background: "#1a1a26"
    borderRadius: 12
    border: "1px solid rgba(232,168,50,0.15)"
    padding: 10
    special: true
    accentColor: "#e8a832"
    effects:
      - type: subtle-glow
        color: "rgba(232, 168, 50, 0.06)"
    controls:
      - id: reverse_mix
        type: rotary-knob
        label: "REVERSE"
        min: 0
        max: 100
        default: 0
        unit: "%"
        knobColor: "#e8a832"
      - id: grain_mutation
        type: rotary-knob
        label: "MUTATION"
        min: 0
        max: 100
        default: 0
        unit: "%"
        knobColor: "#e8a832"
      - id: freq_spread
        type: rotary-knob
        label: "FREQ SPREAD"
        min: 0
        max: 100
        default: 0
        unit: "%"
        knobColor: "#e8a832"

  mix:
    background: "#1a1a26"
    borderRadius: 12
    border: "1px solid rgba(255,255,255,0.06)"
    padding: 10
    accentColor: "#b55dba"
    controls:
      - id: dry_wet
        type: rotary-knob
        label: "DRY/WET"
        min: 0
        max: 100
        default: 50
        unit: "%"
        knobColor: "#b55dba"
        alwaysShowValue: true
        size: large

controls:
  - id: freeze
    type: toggle-button
    label: "FREEZE"
    section: header
    default: false
    width: 72
    height: 28
    style:
      borderRadius: 8
      background: "rgba(255,255,255,0.06)"
      border: "1px solid rgba(255,255,255,0.1)"
      activeBackground: "#2a8a4a"
      activeBorder: "1px solid #3aaa5c"
      activeGlow: "0 0 16px rgba(58, 170, 92, 0.4)"
      activeTextColor: "#ffffff"
      textColor: "#6a6a78"
      fontSize: 9
      fontWeight: 600
      letterSpacing: 2

knobStyle:
  default:
    diameter: 48
    trackWidth: 3.5
    trackColor: "rgba(255,255,255,0.08)"
    fillColor: "per-section"
    fillGlow: true
    indicatorWidth: 2
    indicatorColor: "#ffffff"
    baseColor: "#2a2a38"
    baseBorder: "1px solid rgba(255,255,255,0.08)"
    hoverGlow: "0 0 10px <accent>33"
    activeGlow: "0 0 14px <accent>44"
    arcStartAngle: 225
    arcEndAngle: 315
    arcSweep: 270
    deadZone: "bottom (6 o'clock)"
    rotationDirection: "clockwise min-to-max"
    minPosition: "7 o'clock (225 deg)"
    maxPosition: "5 o'clock (315 deg)"
    labelBelow: true
    valueOnHover: true
  large:
    diameter: 56
    trackWidth: 4

sliderStyle:
  horizontal:
    height: 8
    trackHeight: 6
    trackColor: "rgba(255,255,255,0.06)"
    trackBorderRadius: 4
    thumbWidth: 14
    thumbHeight: 14
    thumbColor: "#3a3a48"
    thumbBorderRadius: 7
    thumbBorder: "1px solid rgba(255,255,255,0.12)"

interaction:
  knob:
    dragSensitivity: 150
    fineModifier: "shift"
    fineSensitivity: 600
    doubleClickReset: true
    scrollEnabled: true
    dragDirection: "up = clockwise = increase"
  slider:
    dragMode: horizontal
    fineModifier: "shift"
    doubleClickReset: true
  button:
    clickToggle: true

accessibility:
  tabOrder: sequential
  ariaLabels: true
  keyboardControl: true
  highContrastMode: false

metadata:
  designVersion: 3
  styleName: "Clean Futurism"
  styleInspiration: "Baby Audio (Crystalline, Spaced Out), Excite Audio Lifeline"
  author: "Plugin Freedom System"
  date: "2026-02-14"
  pluginType: "Granular Delay"
  ioConfig: "Stereo In / Stereo Out"
  parameterCount: 16
  changesFromV2:
    - "Complete aesthetic overhaul: Playful Wooden Toy -> Clean Futurism"
    - "Dark background (#0d0d12 to #15151e), soft neon accent colors"
    - "Window narrowed to 900x480 — no wasted vertical space"
    - "Dry/Wet changed from vertical slider to rotary knob, always shows value"
    - "Reverse Mix changed from vertical slider to rotary knob"
    - "Grain Rate now has Sync toggle + combo box (like Delay Time)"
    - "Hi Cut filter fills from RIGHT to LEFT (visually represents cutting highs)"
    - "Clean modern font (Inter) replacing Quicksand"
    - "Rounded dark panels with subtle borders, colored arc knobs with glow"
    - "Warm futuristic, approachable — not cold/sterile"

# Finalization metadata
finalized: true
finalized_at: 2026-02-14T00:00:00Z
finalized_by_phase: 5.5
