# v1 UI Design Specification
# Generated: 2026-02-13
# Plugin: Degrain — Granular Delay
# Style: Dark Crystal

window:
  width: 900
  height: 600
  resizable: false
  title: "Degrain"

colors:
  background: "#0a0e14"
  backgroundGradientEnd: "#101820"
  panel: "#141c28"
  panelLight: "#1a2436"
  panelDegrain: "#161e30"
  primary: "#4fc3f7"
  primaryDim: "#2a7da8"
  secondary: "#e0e8f0"
  text: "#c0cad8"
  textDim: "#6a7a8a"
  accent: "#81d4fa"
  accentGlow: "rgba(79, 195, 247, 0.35)"
  danger: "#ff6b6b"
  freezeActive: "#00e5ff"
  freezeGlow: "rgba(0, 229, 255, 0.5)"
  border: "#1e2a3a"
  shadow: "rgba(10, 14, 20, 0.8)"
  knobBase: "#1a2030"
  knobRing: "#0f1520"
  sliderTrack: "#0f1520"
  sliderFill: "#4fc3f7"

typography:
  family: "Inter, system-ui, -apple-system, sans-serif"
  sectionHeader:
    size: 11
    weight: 600
    letterSpacing: 2.5
    transform: uppercase
    color: "#4fc3f7"
  paramLabel:
    size: 9
    weight: 400
    letterSpacing: 0.8
    transform: uppercase
    color: "#6a7a8a"
  paramValue:
    size: 10
    weight: 500
    color: "#c0cad8"
  pluginTitle:
    size: 18
    weight: 200
    letterSpacing: 6
    transform: uppercase
    color: "#e0e8f0"

layout:
  type: vertical-split
  headerHeight: 52
  bodyHeight: 548
  padding: 12

  header:
    type: horizontal-bar
    background: "#0a0e14"
    borderBottom: "1px solid #1e2a3a"
    content:
      - type: title
        text: "DEGRAIN"
        position: left
        style: pluginTitle
      - type: subtitle
        text: "GRANULAR DELAY"
        position: left
        offsetLeft: 16
        style:
          size: 9
          weight: 400
          letterSpacing: 3
          color: "#4a5a6a"
      - type: button
        id: freeze
        text: "FREEZE"
        position: right
        marginRight: 16

  body:
    type: horizontal-sections
    gap: 2
    sections:
      - id: delay
        label: "DELAY"
        width: 140
      - id: grain
        label: "GRAIN"
        width: 180
      - id: character
        label: "CHARACTER"
        width: 200
      - id: degrain
        label: "DEGRAIN"
        width: 210
        special: true
        glowBorder: true
      - id: mix
        label: "MIX"
        width: 120

sections:
  delay:
    background: "#141c28"
    borderRadius: 6
    padding: 16
    controls:
      - id: delay_time
        type: rotary-knob
        label: "TIME"
        row: 1
        min: 1
        max: 2000
        default: 250
        unit: "ms"
        curve: logarithmic
        syncable: true
      - id: sync_toggle
        type: toggle-button
        label: "SYNC"
        row: 1
        below: delay_time
        width: 50
        height: 20
        default: false
      - id: sync_division
        type: combo-box
        label: "DIV"
        row: 1
        below: sync_toggle
        visibleWhen:
          parameter: sync_toggle
          value: true
        options:
          - { label: "1/1", value: "1/1" }
          - { label: "1/1D", value: "1/1D" }
          - { label: "1/1T", value: "1/1T" }
          - { label: "1/2", value: "1/2" }
          - { label: "1/2D", value: "1/2D" }
          - { label: "1/2T", value: "1/2T" }
          - { label: "1/4", value: "1/4" }
          - { label: "1/4D", value: "1/4D" }
          - { label: "1/4T", value: "1/4T" }
          - { label: "1/8", value: "1/8" }
          - { label: "1/8D", value: "1/8D" }
          - { label: "1/8T", value: "1/8T" }
          - { label: "1/16", value: "1/16" }
          - { label: "1/16D", value: "1/16D" }
          - { label: "1/16T", value: "1/16T" }
          - { label: "1/32", value: "1/32" }
          - { label: "1/32D", value: "1/32D" }
          - { label: "1/32T", value: "1/32T" }
        default: "1/4"

  grain:
    background: "#141c28"
    borderRadius: 6
    padding: 16
    controls:
      - id: grain_size
        type: rotary-knob
        label: "SIZE"
        row: 1
        column: 1
        min: 5
        max: 500
        default: 80
        unit: "ms"
        curve: logarithmic
      - id: grain_rate
        type: rotary-knob
        label: "RATE"
        row: 1
        column: 2
        min: 0.1
        max: 100
        default: 10
        unit: "Hz"
        curve: logarithmic
      - id: grain_shape
        type: segmented-selector
        label: "SHAPE"
        row: 2
        fullWidth: true
        options:
          - { label: "SIN", value: "sine" }
          - { label: "TRI", value: "triangle" }
          - { label: "SQR", value: "square" }
          - { label: "RMP", value: "ramp" }
        default: "sine"

  character:
    background: "#141c28"
    borderRadius: 6
    padding: 16
    controls:
      - id: feedback
        type: rotary-knob
        label: "FEEDBACK"
        row: 1
        column: 1
        min: 0
        max: 120
        default: 40
        unit: "%"
        warningAbove: 100
        warningColor: "#ff6b6b"
      - id: diffusion
        type: rotary-knob
        label: "DIFFUSION"
        row: 1
        column: 2
        min: 0
        max: 100
        default: 30
        unit: "%"
      - id: stereo_spread
        type: rotary-knob
        label: "SPREAD"
        row: 2
        column: 1
        min: 0
        max: 100
        default: 50
        unit: "%"
      - id: detune
        type: rotary-knob
        label: "DETUNE"
        row: 2
        column: 2
        min: -50
        max: 50
        default: 0
        unit: "ct"
        bipolar: true
        centerNotch: true
      - id: low_cut
        type: vertical-slider
        label: "LO CUT"
        row: 3
        column: 1
        min: 20
        max: 5000
        default: 20
        unit: "Hz"
        curve: logarithmic
        height: 60
      - id: high_cut
        type: vertical-slider
        label: "HI CUT"
        row: 3
        column: 2
        min: 200
        max: 20000
        default: 20000
        unit: "Hz"
        curve: logarithmic
        height: 60

  degrain:
    background: "#161e30"
    borderRadius: 6
    padding: 16
    special: true
    effects:
      - type: glow-border
        color: "rgba(79, 195, 247, 0.12)"
        width: 1
      - type: crystalline-texture
        opacity: 0.04
      - type: inner-glow
        color: "rgba(79, 195, 247, 0.03)"
    controls:
      - id: reverse_mix
        type: vertical-slider
        label: "REVERSE"
        row: 1
        column: 1
        min: 0
        max: 100
        default: 0
        unit: "%"
        height: 120
        accentColor: "#4fc3f7"
        markerLabels:
          top: "REV"
          bottom: "FWD"
      - id: grain_mutation
        type: rotary-knob
        label: "MUTATION"
        row: 1
        column: 2
        min: 0
        max: 100
        default: 0
        unit: "%"
        size: large
        accentColor: "#4fc3f7"
      - id: freq_spread
        type: rotary-knob
        label: "FREQ SPREAD"
        row: 1
        column: 3
        min: 0
        max: 100
        default: 0
        unit: "%"
        size: large
        accentColor: "#4fc3f7"

  mix:
    background: "#141c28"
    borderRadius: 6
    padding: 16
    controls:
      - id: dry_wet
        type: vertical-slider
        label: "DRY/WET"
        row: 1
        min: 0
        max: 100
        default: 50
        unit: "%"
        height: 200
        markerLabels:
          top: "WET"
          bottom: "DRY"

controls:
  - id: freeze
    type: toggle-button
    label: "FREEZE"
    section: header
    default: false
    width: 72
    height: 28
    style:
      borderRadius: 4
      background: "#141c28"
      border: "1px solid #1e2a3a"
      activeBackground: "#002a3a"
      activeBorder: "1px solid #00e5ff"
      activeGlow: "0 0 12px rgba(0, 229, 255, 0.5)"
      activeTextColor: "#00e5ff"
      textColor: "#6a7a8a"
      fontSize: 10
      fontWeight: 600
      letterSpacing: 2

knobStyle:
  default:
    diameter: 48
    trackWidth: 3
    trackColor: "#0f1520"
    fillColor: "#4fc3f7"
    indicatorWidth: 2
    indicatorColor: "#e0e8f0"
    baseColor: "#1a2030"
    baseBorder: "1px solid #1e2a3a"
    hoverGlow: "0 0 8px rgba(79, 195, 247, 0.2)"
    activeGlow: "0 0 12px rgba(79, 195, 247, 0.35)"
    arcStartAngle: 135
    arcEndAngle: 405
    labelBelow: true
    valueOnHover: true
  large:
    diameter: 56
    trackWidth: 3.5

sliderStyle:
  vertical:
    width: 32
    trackWidth: 4
    trackColor: "#0f1520"
    trackBorderRadius: 2
    fillColor: "#4fc3f7"
    thumbWidth: 24
    thumbHeight: 8
    thumbColor: "#e0e8f0"
    thumbBorderRadius: 3
    thumbBorder: "1px solid #4fc3f7"
    labelBelow: true
    valueOnHover: true

interaction:
  knob:
    dragSensitivity: 150
    fineModifier: "shift"
    fineSensitivity: 600
    doubleClickReset: true
    scrollEnabled: true
  slider:
    dragMode: vertical
    fineModifier: "shift"
    doubleClickReset: true
  button:
    clickToggle: true

accessibility:
  tabOrder: sequential
  ariaLabels: true
  keyboardControl: true
  highContrastMode: false

metadata:
  designVersion: 1
  styleName: "Dark Crystal"
  author: "Plugin Freedom System"
  date: "2026-02-13"
  pluginType: "Granular Delay"
  ioConfig: "Stereo In / Stereo Out"
  parameterCount: 15
