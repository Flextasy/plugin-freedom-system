# v2 UI Design Specification
# Generated: 2026-02-14
# Plugin: Degrain — Granular Delay
# Style: Playful Wooden Toy (Scandinavian-inspired)

window:
  width: 900
  height: 600
  resizable: false
  title: "Degrain"

colors:
  background: "#c4a882"
  backgroundGradientEnd: "#b89b72"
  woodGrain: "repeating-linear-gradient(95deg, transparent 0%, rgba(0,0,0,0.03) 2%, transparent 4%)"
  panel: "#d4b892"
  panelLight: "#dcc4a0"
  panelDegrain: "#e8d0a8"

  # Section accent colors
  delayAccent: "#e85d3a"       # Warm red-orange
  grainAccent: "#3aaa5c"       # Natural green
  characterAccent: "#3a8ed6"   # Friendly blue
  degrainAccent: "#e8a832"    # Warm golden yellow
  mixAccent: "#b55dba"         # Playful purple

  primary: "#e85d3a"
  secondary: "#3a2a1a"
  text: "#3a2a1a"
  textDim: "#7a6a5a"
  textLight: "#f5e8d8"
  accent: "#e8a832"
  danger: "#d43030"
  freezeActive: "#3aaa5c"
  freezeGlow: "rgba(58, 170, 92, 0.5)"
  border: "#a08060"
  borderLight: "#c8aa80"
  shadow: "rgba(60, 40, 20, 0.3)"
  knobBase: "#f0e0cc"
  knobRing: "#a08060"
  sliderTrack: "#8a7050"
  sliderFill: "#e85d3a"

typography:
  family: "Quicksand, Nunito, system-ui, -apple-system, sans-serif"
  sectionHeader:
    size: 11
    weight: 700
    letterSpacing: 2
    transform: uppercase
    color: "per-section"
  paramLabel:
    size: 9
    weight: 600
    letterSpacing: 0.8
    transform: uppercase
    color: "#5a4a3a"
  paramValue:
    size: 10
    weight: 600
    color: "#3a2a1a"
  pluginTitle:
    size: 20
    weight: 700
    letterSpacing: 4
    transform: uppercase
    color: "#3a2a1a"

layout:
  type: vertical-split
  headerHeight: 50
  bodyHeight: 550
  padding: 8

  header:
    type: horizontal-bar
    background: "#b89468"
    borderBottom: "2px solid #a08050"
    borderRadius: "10px 10px 0 0"
    content:
      - type: title
        text: "DEGRAIN"
        position: left
        style: pluginTitle
      - type: subtitle
        text: "GRANULAR DELAY"
        position: left
        offsetLeft: 14
        style:
          size: 9
          weight: 600
          letterSpacing: 2.5
          color: "#6a5a4a"
      - type: button
        id: freeze
        text: "FREEZE"
        position: right
        marginRight: 14

  body:
    type: horizontal-sections
    gap: 6
    sections:
      - id: delay
        label: "DELAY"
        accentColor: "#e85d3a"
        flex: 1.0
      - id: grain
        label: "GRAIN"
        accentColor: "#3aaa5c"
        flex: 1.3
      - id: character
        label: "CHARACTER"
        accentColor: "#3a8ed6"
        flex: 1.6
      - id: degrain
        label: "DEGRAIN"
        accentColor: "#e8a832"
        flex: 1.7
        special: true
      - id: mix
        label: "MIX"
        accentColor: "#b55dba"
        flex: 0.8

sections:
  delay:
    background: "#d4b892"
    borderRadius: 12
    padding: 12
    accentColor: "#e85d3a"
    controls:
      - id: delay_time
        type: rotary-knob
        label: "TIME"
        min: 1
        max: 2000
        default: 250
        unit: "ms"
        curve: logarithmic
        knobColor: "#e85d3a"
        syncable: true
      - id: sync_toggle
        type: toggle-button
        label: "SYNC"
        default: false
        accentColor: "#e85d3a"
      - id: sync_division
        type: combo-box
        label: "DIV"
        visibleWhen:
          parameter: sync_toggle
          value: true
        options:
          - { label: "1/1", value: "1/1" }
          - { label: "1/1D", value: "1/1D" }
          - { label: "1/1T", value: "1/1T" }
          - { label: "1/2", value: "1/2" }
          - { label: "1/2D", value: "1/2D" }
          - { label: "1/2T", value: "1/2T" }
          - { label: "1/4", value: "1/4" }
          - { label: "1/4D", value: "1/4D" }
          - { label: "1/4T", value: "1/4T" }
          - { label: "1/8", value: "1/8" }
          - { label: "1/8D", value: "1/8D" }
          - { label: "1/8T", value: "1/8T" }
          - { label: "1/16", value: "1/16" }
          - { label: "1/16D", value: "1/16D" }
          - { label: "1/16T", value: "1/16T" }
          - { label: "1/32", value: "1/32" }
          - { label: "1/32D", value: "1/32D" }
          - { label: "1/32T", value: "1/32T" }
        default: "1/4"

  grain:
    background: "#d4b892"
    borderRadius: 12
    padding: 12
    accentColor: "#3aaa5c"
    controls:
      - id: grain_size
        type: rotary-knob
        label: "SIZE"
        row: 1
        column: 1
        min: 5
        max: 500
        default: 80
        unit: "ms"
        curve: logarithmic
        knobColor: "#3aaa5c"
      - id: grain_rate
        type: rotary-knob
        label: "RATE"
        row: 1
        column: 2
        min: 0.1
        max: 100
        default: 10
        unit: "Hz"
        curve: logarithmic
        knobColor: "#3aaa5c"
      - id: grain_shape
        type: segmented-selector
        label: "SHAPE"
        row: 2
        fullWidth: true
        options:
          - { label: "SIN", value: "sine" }
          - { label: "TRI", value: "triangle" }
          - { label: "SQR", value: "square" }
          - { label: "RMP", value: "ramp" }
        default: "sine"
        accentColor: "#3aaa5c"

  character:
    background: "#d4b892"
    borderRadius: 12
    padding: 12
    accentColor: "#3a8ed6"
    controls:
      - id: feedback
        type: rotary-knob
        label: "FEEDBACK"
        row: 1
        column: 1
        min: 0
        max: 120
        default: 40
        unit: "%"
        warningAbove: 100
        warningColor: "#d43030"
        knobColor: "#3a8ed6"
      - id: diffusion
        type: rotary-knob
        label: "DIFFUSION"
        row: 1
        column: 2
        min: 0
        max: 100
        default: 30
        unit: "%"
        knobColor: "#3a8ed6"
      - id: stereo_spread
        type: rotary-knob
        label: "SPREAD"
        row: 2
        column: 1
        min: 0
        max: 100
        default: 50
        unit: "%"
        knobColor: "#3a8ed6"
      - id: detune
        type: rotary-knob
        label: "DETUNE"
        row: 2
        column: 2
        min: -50
        max: 50
        default: 0
        unit: "ct"
        bipolar: true
        centerNotch: true
        knobColor: "#3a8ed6"
      - id: low_cut
        type: horizontal-slider
        label: "LO CUT"
        row: 3
        column: 1
        min: 20
        max: 5000
        default: 20
        unit: "Hz"
        curve: logarithmic
        accentColor: "#3a8ed6"
      - id: high_cut
        type: horizontal-slider
        label: "HI CUT"
        row: 3
        column: 2
        min: 200
        max: 20000
        default: 20000
        unit: "Hz"
        curve: logarithmic
        accentColor: "#3a8ed6"

  degrain:
    background: "#dcc4a0"
    borderRadius: 12
    padding: 12
    special: true
    accentColor: "#e8a832"
    effects:
      - type: painted-border
        color: "#e8a832"
        width: 2
      - type: subtle-glow
        color: "rgba(232, 168, 50, 0.15)"
    controls:
      - id: reverse_mix
        type: vertical-slider
        label: "REVERSE"
        min: 0
        max: 100
        default: 0
        unit: "%"
        accentColor: "#e8a832"
        markerLabels:
          top: "REV"
          bottom: "FWD"
      - id: grain_mutation
        type: rotary-knob
        label: "MUTATION"
        min: 0
        max: 100
        default: 0
        unit: "%"
        size: large
        knobColor: "#e8a832"
      - id: freq_spread
        type: rotary-knob
        label: "FREQ SPREAD"
        min: 0
        max: 100
        default: 0
        unit: "%"
        size: large
        knobColor: "#e8a832"

  mix:
    background: "#d4b892"
    borderRadius: 12
    padding: 12
    accentColor: "#b55dba"
    controls:
      - id: dry_wet
        type: vertical-slider
        label: "DRY/WET"
        min: 0
        max: 100
        default: 50
        unit: "%"
        accentColor: "#b55dba"
        alwaysShowValue: true
        markerLabels:
          top: "WET"
          bottom: "DRY"

controls:
  - id: freeze
    type: toggle-button
    label: "FREEZE"
    section: header
    default: false
    width: 76
    height: 30
    style:
      borderRadius: 8
      background: "#c8a878"
      border: "2px solid #a08050"
      activeBackground: "#2a8a4a"
      activeBorder: "2px solid #3aaa5c"
      activeGlow: "0 0 14px rgba(58, 170, 92, 0.5)"
      activeTextColor: "#ffffff"
      textColor: "#6a5a4a"
      fontSize: 10
      fontWeight: 700
      letterSpacing: 2

knobStyle:
  default:
    diameter: 52
    trackWidth: 4
    trackColor: "#a08060"
    fillColor: "per-section"
    indicatorWidth: 2.5
    indicatorColor: "#3a2a1a"
    baseColor: "#f0e0cc"
    baseBorder: "2px solid #c8aa80"
    hoverGlow: "0 0 8px rgba(0,0,0,0.15)"
    activeGlow: "0 0 12px rgba(0,0,0,0.2)"
    arcStartAngle: 225
    arcEndAngle: 315
    arcSweep: 270
    deadZone: "bottom (6 o'clock)"
    rotationDirection: "clockwise min-to-max"
    minPosition: "7 o'clock (225 deg)"
    maxPosition: "5 o'clock (315 deg)"
    labelBelow: true
    valueOnHover: true
  large:
    diameter: 60
    trackWidth: 4.5

sliderStyle:
  vertical:
    width: 36
    trackWidth: 8
    trackColor: "#8a7050"
    trackBorderRadius: 6
    fillColor: "per-section"
    thumbWidth: 30
    thumbHeight: 12
    thumbColor: "#f0e0cc"
    thumbBorderRadius: 6
    thumbBorder: "2px solid #a08060"
    labelBelow: true
    valueAlwaysVisible: true
  horizontal:
    height: 10
    trackHeight: 8
    trackColor: "#8a7050"
    trackBorderRadius: 6
    thumbWidth: 16
    thumbHeight: 16
    thumbColor: "#f0e0cc"
    thumbBorderRadius: 8
    thumbBorder: "2px solid #a08060"

interaction:
  knob:
    dragSensitivity: 150
    fineModifier: "shift"
    fineSensitivity: 600
    doubleClickReset: true
    scrollEnabled: true
    dragDirection: "up = clockwise = increase"
  slider:
    dragMode: vertical
    fineModifier: "shift"
    doubleClickReset: true
  button:
    clickToggle: true

accessibility:
  tabOrder: sequential
  ariaLabels: true
  keyboardControl: true
  highContrastMode: false

metadata:
  designVersion: 2
  styleName: "Playful Wooden Toy"
  styleInspiration: "Teenage Engineering OP-1, Scandinavian toy design"
  author: "Plugin Freedom System"
  date: "2026-02-14"
  pluginType: "Granular Delay"
  ioConfig: "Stereo In / Stereo Out"
  parameterCount: 16
  changesFromV1:
    - "Complete aesthetic overhaul: Dark Crystal -> Playful Wooden Toy"
    - "Fixed knob rotation direction (clockwise min-to-max, 7 o'clock to 5 o'clock)"
    - "Dry/Wet slider always shows current value"
    - "Dense layout with no empty space"
    - "Colorful per-section accent colors"
    - "Rounded, friendly shapes with generous border-radius"
    - "Wood texture background"
    - "Google Font: Quicksand (rounded, friendly)"
